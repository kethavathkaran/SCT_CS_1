<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher Cryptor</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea, input[type="number"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .flex-1 {
            flex: 1;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-encrypt {
            background: var(--primary);
            color: white;
        }

        .btn-encrypt:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-decrypt {
            background: transparent;
            border: 2px solid var(--primary);
            color: #a5b4fc;
        }

        .btn-decrypt:hover {
            background: rgba(79, 70, 229, 0.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .output-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            min-height: 60px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Caesar Cipher</h1>
        <p class="subtitle">Secure or decode your messages instantly</p>

        <div class="input-group">
            <label for="message">Your Message</label>
            <textarea id="message" placeholder="Type or paste your message here..."></textarea>
        </div>

        <div class="input-group">
            <label for="shift">Shift Key (Value)</label>
            <input type="number" id="shift" value="3" min="0" max="25">
        </div>

        <div class="btn-container">
            <button class="btn-encrypt" onclick="processCipher(true)">Encrypt</button>
            <button class="btn-decrypt" onclick="processCipher(false)">Decrypt</button>
        </div>

        <div class="input-group">
            <label>Result</label>
            <div class="output-box" id="result">Your output will appear here...</div>
        </div>
    </div>

    <script>
        function caesarCipher(str, shift, encrypt = true) {
            // Adjust shift value for decryption
            if (!encrypt) {
                shift = (26 - (shift % 26)) % 26;
            } else {
                shift = shift % 26;
            }

            return str.split('').map(char => {
                const code = char.charCodeAt(0);

                // Check Uppercase Letters (A-Z)
                if (code >= 65 && code <= 90) {
                    return String.fromCharCode(((code - 65 + shift) % 26) + 65);
                }
                // Check Lowercase Letters (a-z)
                else if (code >= 97 && code <= 122) {
                    return String.fromCharCode(((code - 97 + shift) % 26) + 97);
                }
                
                // Return non-alphabetic characters unchanged (spaces, symbols, numbers)
                return char;
            }).join('');
        }

        function processCipher(isEncryption) {
            const messageInput = document.getElementById('message').value;
            let shiftInput = parseInt(document.getElementById('shift').value);
            const resultBox = document.getElementById('result');

            // Input Validation
            if (!messageInput.trim()) {
                resultBox.style.color = '#ef4444';
                resultBox.innerText = 'Please enter a message.';
                return;
            }

            if (isNaN(shiftInput) || shiftInput < 0) {
                resultBox.style.color = '#ef4444';
                resultBox.innerText = 'Please enter a valid positive shift key number.';
                return;
            }

            // Perform translation
            const result = caesarCipher(messageInput, shiftInput, isEncryption);
            
            // Display Result
            resultBox.style.color = '#34d399';
            resultBox.innerText = result;
        }
    </script>

</body>
</html>
